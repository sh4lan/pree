<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Primer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Word Primer</h1>
      <p class="subtitle">Prime new vocabulary for better retention</p>
    </header>

    <!-- Drop Zone -->
    <section class="drop-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">Drop a <code>.txt</code> file here</p>
          <p class="drop-hint">or click to browse</p>
        </div>
        <input type="file" id="fileInput" accept=".txt" hidden>
      </div>
      <p id="dropStatus" class="status-message"></p>
    </section>

    <!-- Known Words Controls -->
    <section class="known-section">
      <div class="known-header">
        <span class="known-count">Known words: <strong id="knownCount">0</strong></span>
        <div class="known-buttons">
          <button id="importKnownBtn" class="btn btn-secondary">Import</button>
          <button id="exportKnownBtn" class="btn btn-secondary">Export</button>
          <button id="clearKnownBtn" class="btn btn-danger">Clear All</button>
        </div>
      </div>
      <input type="file" id="knownFileInput" accept=".txt" hidden>
    </section>

    <!-- Word List -->
    <section id="wordSection" class="word-section hidden">
      <div class="word-header">
        <div>
          <h2>New words</h2>
          <span id="wordCounter" class="word-counter"></span>
        </div>
        <button id="markAllBtn" class="btn btn-primary">Mark All as Known</button>
      </div>
      <div id="wordList" class="word-list"></div>
    </section>

    <!-- Empty State -->
    <section id="emptyState" class="empty-state hidden">
      <p>No new words to show. Drop a file above to get started.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
