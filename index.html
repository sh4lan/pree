<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Primer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Drop Zone -->
    <section class="drop-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">Drop a <code>.txt</code> file here</p>
          <p class="drop-hint">or click to browse</p>
        </div>
        <input type="file" id="fileInput" accept=".txt" hidden>
      </div>
      <p id="dropStatus" class="status-message"></p>
    </section>

    <!-- Status Bar -->
    <section class="status-bar">
      <span class="stat">Known: <strong id="knownCount">0</strong></span>
      <span id="newStat" class="stat hidden">New: <strong id="newCount">0</strong></span>
      <span class="bar-spacer"></span>
      <button id="openLibraryBtn" class="btn btn-text">Manage...</button>
    </section>

    <!-- Word List -->
    <section id="wordSection" class="word-section hidden">
      <div id="wordList" class="word-list"></div>
    </section>

    <!-- Empty State -->
    <section id="emptyState" class="empty-state hidden">
      <p>No new words to show. Drop a file above to get started.</p>
    </section>

    <!-- Library Overlay -->
    <div id="libraryOverlay" class="overlay hidden">
      <div class="overlay-backdrop"></div>
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Known words</h2>
          <button id="closeLibraryBtn" class="btn btn-text btn-close">&times;</button>
        </div>
        <div class="overlay-actions">
          <button id="libraryImportBtn" class="btn btn-secondary">Import</button>
          <button id="libraryExportBtn" class="btn btn-secondary">Export</button>
          <button id="libraryClearBtn" class="btn btn-danger">Clear All</button>
          <input type="file" id="libraryFileInput" accept=".txt" hidden>
        </div>
        <div id="libraryList" class="word-list overlay-list"></div>
        <div id="libraryEmpty" class="empty-state">
          <p>No known words yet.</p>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
