<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Primer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Primer View -->
    <div id="primerView">
      <section class="input-section">
        <div id="dropZone" class="drop-zone">
          <div class="drop-zone-content">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="drop-text">Drop a <code>.txt</code> file here</p>
            <p class="drop-hint">or click to browse</p>
          </div>
          <input type="file" id="fileInput" accept=".txt" hidden>
        </div>
      </section>

      <section class="paste-section">
        <div class="paste-header">
          <span class="stat">Or paste text below:</span>
        </div>
        <textarea id="pasteTextarea" class="paste-area" placeholder="Paste Japanese text here (book, article, etc.)..."></textarea>
        <div class="paste-buttons">
          <button id="extractBtn" class="btn btn-add">Extract Words</button>
          <button id="downloadWordListBtn" class="btn btn-secondary hidden">Download Word List</button>
          <span id="pasteStatus" class="stat" style="margin-left:0.5rem"></span>
        </div>
      </section>

      <section class="status-bar">
        <span class="stat">Known: <strong id="knownCount">0</strong></span>
        <span id="newStat" class="stat hidden">New: <strong id="newCount">0</strong></span>
        <span id="dictPrimerStat" class="stat hidden"></span>
        <span class="bar-spacer"></span>
        <button id="themeBtn" class="btn btn-text theme-btn">Dark</button>
        <button id="openLibraryBtn" class="btn btn-text">Manage...</button>
      </section>

      <section id="wordSection" class="word-section hidden">
        <div id="wordList" class="word-list"></div>
      </section>

      <section id="emptyState" class="empty-state hidden">
        <p>No new words to show. Drop a file above to get started.</p>
      </section>
    </div>

    <!-- Library View -->
    <div id="libraryView" class="hidden">
      <section class="status-bar">
        <span class="stat">Known: <strong id="libraryKnownCount">0</strong></span>
        <button id="libraryImportBtn" class="btn btn-text">Import...</button>
        <button id="libraryExportBtn" class="btn btn-text">Export</button>
        <button id="libraryClearBtn" class="btn btn-text btn-text-danger">Clear</button>
        <span class="bar-spacer"></span>
        <span id="dictBar" class="stat hidden"></span>
        <button id="dictBtn" class="btn btn-text">Load Dict...</button>
        <button id="backToPrimerBtn" class="btn btn-text">&larr; Back</button>
        <input type="file" id="libraryFileInput" accept=".txt" hidden>
        <input type="file" id="dictFileInput" accept=".zip" hidden>
      </section>

      <div id="libraryList" class="word-list"></div>
      <div id="libraryEmpty" class="empty-state">
        <p>No known words yet.</p>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
  <script src="app.js"></script>
</body>
</html>
